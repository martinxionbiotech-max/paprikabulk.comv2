site_name: Paprikabulk.com — Technical Documentation

site_url: https://paprikabulk.com

site_description: >
  Complete technical knowledge base for paprika procurement,
  quality control, specification interpretation,
  regulatory compliance, and global paprika supply chain management.

site_author: Dinweys (Qingdao) Co., Ltd

repo_url: https://github.com/dinweys/paprika-docs
repo_name: dinweys/paprika-docs
edit_uri: blob/main/docs/

copyright: >
  Copyright © 2026 Dinweys (Qingdao) Co., Ltd —
  All Rights Reserved


theme:
  name: material

  custom_dir: overrides

  language: en


  palette:

    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode


    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode



  features:

    # Sidebar knowledge navigation
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top


    # Search
    - search.suggest
    - search.highlight


    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link


    # TOC
    - toc.follow


  logo: assets/logo.png

  favicon: assets/favicon.ico



extra:

  generator: false



markdown_extensions:

  - toc:
      permalink: true
      toc_depth: 3


  - tables

  - admonition

  - footnotes

  - attr_list

  - md_in_html


  - pymdownx.highlight:
      anchor_linenums: true


  - pymdownx.superfences


  - pymdownx.details


  - pymdownx.tabbed:
      alternate_style: true


  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji

      emoji_generator: !!python/name:material.extensions.emoji.to_svg


  - pymdownx.tasklist:
      custom_checkbox: true


  - pymdownx.keys

  - pymdownx.mark

  - pymdownx.smartsymbols



plugins:

  - search

  - glightbox

  - minify:
      minify_html: true



extra_css:

  - assets/extra.css



